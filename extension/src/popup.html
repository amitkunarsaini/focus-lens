<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>FocusLens</title>
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo"></span>
        <span class="name">Focus<b>Lens</b></span>
      </div>
      <span id="dot" class="dot"></span>
    </header>

    <div id="unconfigured" class="banner hidden">
      Not connected. Open <b>Settings</b> and paste your ingest token from the dashboard.
    </div>

    <div class="stats">
      <div class="stat">
        <div id="todayTime" class="value">0m</div>
        <div class="label">Tracked today</div>
      </div>
      <div class="stat">
        <div id="todayEvents" class="value">0</div>
        <div class="label">Events</div>
      </div>
      <div class="stat">
        <div id="queued" class="value">0</div>
        <div class="label">Queued</div>
      </div>
    </div>

    <label class="toggle">
      <input type="checkbox" id="tracking" />
      <span>Tracking active</span>
    </label>

    <div class="actions">
      <button id="sync" class="btn">Sync now</button>
      <button id="dashboard" class="btn primary">Open dashboard</button>
    </div>
    <button id="settings" class="link">Settings</button>

    <script src="popup.js"></script>
  </body>
</html>
